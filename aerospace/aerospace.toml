# --- CORE SETTINGS ---
start-at-login = true
automatically-unhide-macos-hidden-apps = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

# --- KEYBINDINGS ---
[mode.main.binding]
    ctrl-slash = 'layout tiles horizontal vertical'
    ctrl-comma = 'layout accordion horizontal vertical'
    ctrl-h = 'focus left'
    ctrl-j = 'focus down'
    ctrl-k = 'focus up'
    ctrl-l = 'focus right'
    ctrl-shift-h = 'move left'
    ctrl-shift-j = 'move down'
    ctrl-shift-k = 'move up'
    ctrl-shift-l = 'move right'
    ctrl-minus = 'resize smart -50'
    ctrl-equal = 'resize smart +50'
    ctrl-1 = 'workspace 1'
    ctrl-2 = 'workspace 2'
    ctrl-3 = 'workspace 3'
    ctrl-4 = 'workspace 4'
    ctrl-5 = 'workspace 5'
    ctrl-6 = 'workspace 6'
    ctrl-7 = 'workspace 7'
    ctrl-8 = 'workspace 8'
    ctrl-9 = 'workspace 9'
    ctrl-q = 'workspace Q'
    ctrl-w = 'workspace W'
    ctrl-e = 'workspace E'
    ctrl-r = 'workspace R'
    ctrl-shift-1 = ["move-node-to-workspace 1", "workspace 1"]
    ctrl-shift-2 = ["move-node-to-workspace 2", "workspace 2"]
    ctrl-shift-3 = ["move-node-to-workspace 3", "workspace 3"]
    ctrl-shift-4 = ["move-node-to-workspace 4", "workspace 4"]
    ctrl-shift-5 = ["move-node-to-workspace 5", "workspace 5"]
    ctrl-shift-6 = ["move-node-to-workspace 6", "workspace 6"]
    ctrl-shift-7 = ["move-node-to-workspace 7", "workspace 7"]
    ctrl-shift-8 = ["move-node-to-workspace 8", "workspace 8"]
    ctrl-shift-9 = ["move-node-to-workspace 9", "workspace 9"]
    ctrl-shift-q = ["move-node-to-workspace Q", "workspace Q"]
    ctrl-shift-w = ["move-node-to-workspace W", "workspace W"]
    ctrl-shift-e = ["move-node-to-workspace E", "workspace E"]
    ctrl-shift-r = ["move-node-to-workspace R", "workspace R"]
    ctrl-alt-r = 'reload-config'
    ctrl-shift-f = 'layout floating tiling'
    ctrl-tab = 'workspace-back-and-forth'
    ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'
    ctrl-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

# --- MONITOR ASSIGNMENT ---
[workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'main'
    5 = 'main'
    6 = 'main'
    7 = 'main'
    8 = 'main'
    9 = 'main'
    Q = 'secondary'
    W = 'secondary'
    E = 'secondary'
    R = 'secondary'

# --- THE v0.20.3 COMPATIBLE RULES ---

# ZOTERO: Only moves if the window title is EXACTLY "Zotero"
[[on-window-detected]]
if.app-id = 'org.zotero.zotero'
if.window-title-regex-substring = '^Zotero$'
run = 'move-node-to-workspace 6'

# FINDER: Only moves if it's the main Finder window
[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = '^Finder$'
run = 'move-node-to-workspace 1'

# VS CODE:
[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 8'

# OTHER APPS (Basic Rules)
[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 5'